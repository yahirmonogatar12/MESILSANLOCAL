<!-- Control de maquinas de calidad - fragmento AJAX.
     WF_001: cargado desde LISTA_CONTROL_DE_CALIDAD / Control de maquinas.
     WF_002: container stations-qa-unique-container.
     WF_003: consumido por app/api/control_calidad/stations_qa.py.
     WF_004: CSS persistente en MainTemplate.html y JS idempotente.
     Estilo: tarjetas tema ILSAN, mismo lenguaje visual que Historial ICT (history_ict.html / ict.css). -->
<section id="stqa-module" class="stqa-page">

  <!-- Tarjeta de filtros -->
  <div class="stqa-card">
    <div class="stqa-card-header">
      <svg class="stqa-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path>
      </svg>
      <h3>Filtros de Búsqueda</h3>
    </div>
    <form id="stqa-filters" class="stqa-filters">
      <div class="stqa-filter-group stqa-filter-group--search">
        <label for="stqa-search">
          <svg class="stqa-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          Buscar
        </label>
        <input id="stqa-search" type="search" autocomplete="off" placeholder="Código, nombre o línea...">
      </div>

      <div class="stqa-filter-group">
        <label for="stqa-type-filter">
          <svg class="stqa-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path>
          </svg>
          Tipo
        </label>
        <select id="stqa-type-filter">
          <option value="">Todos</option>
          <option value="ICT">ICT</option>
          <option value="FCT">FCT</option>
          <option value="Packing">Packing</option>
        </select>
      </div>

      <button class="stqa-btn-primary" type="submit">
        <svg class="stqa-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        Consultar
      </button>
      <button id="stqa-clear" class="stqa-btn-ghost" type="button">Limpiar</button>
    </form>
  </div>

  <!-- Modal de formulario (alta/edicion), estilo modal del Historial ICT -->
  <div id="stqa-form-panel" class="stqa-modal" hidden>
    <div class="stqa-modal-content" role="dialog" aria-modal="true" aria-labelledby="stqa-form-title">
      <div class="stqa-modal-header">
        <div class="stqa-modal-title-group">
          <svg class="stqa-modal-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
          </svg>
          <h3 id="stqa-form-title">Nueva estación</h3>
        </div>
        <button id="stqa-cancel" class="stqa-close-btn" type="button" title="Cerrar formulario" aria-label="Cerrar formulario">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 6L6 18M6 6l12 12"></path>
          </svg>
        </button>
      </div>
      <form id="stqa-form" class="stqa-form">
      <input id="stqa-id" type="hidden">
      <div class="stqa-form-grid">
        <div class="stqa-filter-group">
          <label for="stqa-code">
            <svg class="stqa-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
            </svg>
            Código
          </label>
          <input id="stqa-code" type="text" maxlength="32" required autocomplete="off" placeholder="Ej. ICT-01">
        </div>

        <div class="stqa-filter-group">
          <label for="stqa-name">
            <svg class="stqa-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            Nombre
          </label>
          <input id="stqa-name" type="text" maxlength="128" required autocomplete="off" placeholder="Nombre de la estación">
        </div>

        <div class="stqa-filter-group">
          <label for="stqa-type">
            <svg class="stqa-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path>
            </svg>
            Tipo
          </label>
          <select id="stqa-type" required>
            <option value="ICT">ICT</option>
            <option value="FCT">FCT</option>
            <option value="Packing">Packing</option>
          </select>
        </div>

        <div class="stqa-filter-group">
          <label for="stqa-host">
            <svg class="stqa-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            Línea
          </label>
          <input id="stqa-host" type="text" maxlength="128" autocomplete="off" placeholder="Ej. M1">
        </div>

        <label class="stqa-check" for="stqa-active-input">
          <input id="stqa-active-input" type="checkbox" checked>
          <span>Estación activa</span>
        </label>
      </div>
        <div class="stqa-form-actions">
          <button class="stqa-btn-ghost" type="button" id="stqa-cancel-bottom">Cancelar</button>
          <button class="stqa-btn-primary" type="submit">
            <svg class="stqa-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 13l4 4L19 7"></path>
            </svg>
            Guardar
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Tarjeta de resultados -->
  <div class="stqa-card">
    <div class="stqa-card-header">
      <svg class="stqa-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
      </svg>
      <h3>Estaciones Registradas</h3>
      <span class="stqa-record-count"><strong id="stqa-total">0</strong> estaciones</span>
      <span class="stqa-record-count stqa-record-count--ok"><strong id="stqa-active">0</strong> activas</span>
      <span class="stqa-record-count stqa-record-count--ng"><strong id="stqa-inactive">0</strong> inactivas</span>
      <button id="stqa-export" class="stqa-btn-new" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 10v6m0 0l-3-3m3 3l3-3M3 17v3a2 2 0 002 2h14a2 2 0 002-2v-3"></path>
        </svg>
        Exportar Excel
      </button>
      <button id="stqa-refresh" class="stqa-btn-header" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        Actualizar
      </button>
      <button id="stqa-new" class="stqa-btn-new" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 4v16m8-8H4"></path>
        </svg>
        Nueva estación
      </button>
    </div>
    <div class="stqa-table-wrap">
      <div id="stqa-loading" class="stqa-table-loading" hidden>
        <div class="stqa-spinner"></div>
        <span>Cargando estaciones...</span>
      </div>
      <table id="stqa-table" class="stqa-table" aria-label="Estaciones de calidad">
        <thead>
          <tr>
            <th>Línea</th>
            <th>Código</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Estado</th>
            <th>Actualizado UTC</th>
            <th class="stqa-actions-col">Acciones</th>
          </tr>
        </thead>
        <tbody id="stqa-tbody">
          <tr>
            <td colspan="7" class="stqa-empty">Sin datos cargados</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</section>

<script src="{{ url_for('static', filename='js/stations_qa.js', v='20260610a') }}"></script>
