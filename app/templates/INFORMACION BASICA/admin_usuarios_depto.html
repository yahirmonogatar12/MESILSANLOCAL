<!-- Administración de usuario (acotada por departamento) - Fragmento AJAX.
     WF_004: CSS persistente en MainTemplate.html. JS: admin_usuarios_depto.js.
     Reusa el patrón visual de los módulos del portal (.ict-page/.filters-card/...). -->
<div id="adu-container" class="adu-container">
  <div id="adu-root" class="ict-page">

    <!-- Tabla de usuarios -->
    <div class="results-card">
      <div class="card-header">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"></path>
        </svg>
        <h3>Usuarios</h3>
        <span id="adu-scope-hint" class="record-count"></span>
        <span id="adu-count" class="record-count">0 registros</span>
        <input type="text" id="adu-buscar" class="adu-buscar" placeholder="Buscar...">
        <button type="button" id="adu-btn-nuevo" class="btn-primary">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"></path>
            <circle cx="9" cy="7" r="4"></circle>
            <path d="M19 8v6M22 11h-6"></path>
          </svg>
          Nuevo usuario
        </button>
      </div>
      <div class="table-wrap">
        <table id="adu-table">
          <thead>
            <tr>
              <th>Usuario</th><th>Nombre</th><th>Departamento</th><th>Roles</th><th>Estado</th><th></th>
            </tr>
          </thead>
          <tbody id="adu-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal nuevo/editar usuario -->
  <div id="adu-modal" class="adu-modal" aria-hidden="true">
    <div class="adu-modal-backdrop" data-adu-close></div>
    <div class="adu-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="adu-form-title">
      <div class="adu-modal-header">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"></path>
          <circle cx="9" cy="7" r="4"></circle>
          <path d="M19 8v6M22 11h-6"></path>
        </svg>
        <h3 id="adu-form-title">Nuevo usuario</h3>
        <button type="button" class="adu-modal-close" data-adu-close aria-label="Cerrar">&times;</button>
      </div>

      <div class="adu-modal-body">
        <div id="adu-filters">
          <div class="filter-group">
            <label for="adu-username">Usuario</label>
            <input type="text" id="adu-username" autocomplete="off">
          </div>
          <div class="filter-group">
            <label for="adu-nombre">Nombre completo</label>
            <input type="text" id="adu-nombre" autocomplete="off">
          </div>
          <div class="filter-group">
            <label for="adu-email">Email</label>
            <input type="email" id="adu-email" autocomplete="off">
          </div>
          <div class="filter-group">
            <label for="adu-password">Contraseña <span id="adu-pass-hint">(requerida)</span></label>
            <input type="password" id="adu-password" autocomplete="new-password">
          </div>
          <div class="filter-group">
            <label for="adu-departamento">Departamento</label>
            <select id="adu-departamento"></select>
          </div>
          <div class="filter-group">
            <label for="adu-cargo">Cargo</label>
            <input type="text" id="adu-cargo" list="adu-cargo-options" autocomplete="off" placeholder="Escribe o elige...">
            <datalist id="adu-cargo-options"></datalist>
          </div>
          <div class="filter-group adu-activo-group">
            <label for="adu-activo">Estado</label>
            <label class="adu-switch"><input type="checkbox" id="adu-activo" checked> Activo</label>
          </div>
        </div>

        <div class="adu-roles-block">
          <div class="adu-roles-legend">Roles asignables</div>
          <div id="adu-roles-list"><span class="adu-muted">Cargando...</span></div>
        </div>
      </div>

      <div class="adu-modal-footer">
        <button type="button" id="adu-btn-limpiar" class="btn-secondary" data-adu-close>Cancelar</button>
        <button type="button" id="adu-btn-guardar" class="btn-primary">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path>
            <path d="M17 21v-8H7v8M7 3v5h8"></path>
          </svg>
          Guardar
        </button>
      </div>
    </div>
  </div>
</div>

<script defer src="{{ url_for('static', filename='js/admin_usuarios_depto.js', v='20260619d') }}"></script>
