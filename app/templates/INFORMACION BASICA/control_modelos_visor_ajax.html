<!-- Control de Modelos - Fragmento AJAX.
     Estilo alineado con modulos ICT: tarjetas de filtros/resultados,
     tabla densa y acciones compactas. -->
<div id="control-modelos-visor-root" class="ix-shell">
  <main class="ix-main">
    <section class="filters-card ix-filters-card" id="ix-toolbar">
      <div class="card-header">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path>
        </svg>
        <h3>Control de modelos</h3>
        <span id="ix-counter" class="record-count">0 filas</span>
      </div>

      <div class="ix-filter-row">
        <div class="filter-group ix-search-group">
          <label for="ix-search">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
            Buscar
          </label>
          <input id="ix-search" class="ix-input" placeholder="Part no, modelo, proyecto..." autocomplete="off" />
        </div>

        <button id="ix-refresh" type="button" class="btn-export ix-action-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12a9 9 0 11-2.64-6.36"></path>
            <path d="M21 3v6h-6"></path>
          </svg>
          Actualizar
        </button>

        <button id="ix-register" type="button" class="btn-primary ix-action-btn">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"></path>
          </svg>
          Registrar
        </button>
      </div>
    </section>

    <section class="results-card ix-tablecard">
      <div class="card-header">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"></path>
          <path d="M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
          <path d="M9 12h6M9 16h6"></path>
        </svg>
        <h3>Modelos base RAW</h3>
        <span id="ix-table-info" class="ix-table-info">Doble click para editar</span>
      </div>

      <div class="table-wrap ix-tablewrap" id="ix-table-wrap">
        <div class="table-loading ix-table-loading">
          <div class="spinner"></div>
          <span>Cargando modelos...</span>
        </div>
        <table class="ix-table" id="ix-table">
          <thead id="ix-thead">
            <tr><th>Cargando...</th></tr>
          </thead>
          <tbody id="ix-tbody">
            <tr><td class="ix-no-data">Esperando datos...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>
</div>

<script>
  window.IX_BOOT = { table: "{{ table|default('raw') }}" };
  window.usuarioLogueado = '{{ usuario }}';
</script>
<script src="{{ url_for('static', filename='js/resizable_columns.js', v='20260611c') }}"></script>
<script src="{{ url_for('static', filename='js/visor_mysql.js', v='20260611b') }}"></script>
