<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial Vision % Pass/Fail - ILSAN</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ilsan-theme.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/ict.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/history_vision_pass_fail.css') }}">
  <script defer src="{{ url_for('static', filename='js/history_vision_pass_fail.js') }}"></script>
</head>
<body id="vision-pass-fail-container">
  <div id="historial-vision-pass-fail-root" class="ict-page">
    <div class="filters-card">
      <div class="card-header">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path>
        </svg>
        <h3>Filtros de Busqueda</h3>
      </div>
      <div id="vision-pass-fail-filters">
        <div class="filter-group">
          <label for="vision-pass-fail-filter-fecha-desde">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            Fecha desde
          </label>
          <input type="date" id="vision-pass-fail-filter-fecha-desde">
        </div>

        <div class="filter-group">
          <label for="vision-pass-fail-filter-fecha-hasta">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="16" y1="2" x2="16" y2="6"></line>
              <line x1="8" y1="2" x2="8" y2="6"></line>
              <line x1="3" y1="10" x2="21" y2="10"></line>
            </svg>
            Fecha hasta
          </label>
          <input type="date" id="vision-pass-fail-filter-fecha-hasta">
        </div>

        <div class="filter-group">
          <label for="vision-pass-fail-filter-numero-parte">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
            </svg>
            Numero de parte
          </label>
          <input type="text" id="vision-pass-fail-filter-numero-parte" placeholder="Filtrar por part code">
        </div>

        <button id="vision-pass-fail-btn-consultar" class="btn-primary" type="button">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          Consultar
        </button>
      </div>
    </div>

    <div class="results-card">
      <div class="card-header">
        <svg class="card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path>
        </svg>
        <h3>Historial de maquina Vision % Pass/Fail</h3>
        <span id="vision-pass-fail-record-count" class="record-count">0 part numbers</span>
        <button id="vision-pass-fail-btn-export-excel" class="btn-export" type="button">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          Exportar Excel
        </button>
      </div>
      <div class="vision-pass-fail-results-hint">
        Resumen agrupado por numero de parte usando el rango de fechas seleccionado sobre el historial de Vision.
      </div>
      <div class="table-wrap">
        <div class="table-loading" id="vision-pass-fail-table-loading">
          <div class="spinner"></div>
          <span>Cargando datos...</span>
        </div>
        <table id="vision-pass-fail-table">
          <thead>
            <tr>
              <th>Numero de parte</th>
              <th>Total</th>
              <th>OK</th>
              <th>NG</th>
              <th>% Pass</th>
              <th>% Fail</th>
            </tr>
          </thead>
          <tbody id="vision-pass-fail-body"></tbody>
        </table>
      </div>
    </div>
  </div>
</body>
</html>
