<!-- Historial AOI - Fragmento AJAX.
     WF_004: CSS persistente en MainTemplate.html (control_historial_aoi.css).
     WF_002: root <div> con clase y id consistentes con el container del
     MainTemplate (historial-aoi-unique-container). El id "aoi-root" se
     conserva como id interno para que las reglas CSS legacy sigan
     funcionando.
     JS extraido a app/static/js/historial-aoi-module.js (idem WF_004).
     Inicializacion: window.inicializarHistorialAOI() invocado desde el
     callback de cargarContenidoDinamico en scriptMain.js. -->
<div id="aoi-root" class="historial-aoi-container">
  <div id="aoi-header">
    <div id="aoi-title">AOI · Produccion por Turno</div>
    <div id="aoi-now">—</div>
  </div>

  <div id="aoi-toolbar-rt">
    <button id="aoi-btn-refresh">Actualizar</button>
    <span>Tabla 1: Turno en tiempo real</span>
    <span id="aoi-shift-badge">—</span>
  </div>

  <div id="aoi-layout">
    <div id="aoi-card-rt">
      <h3>Turno actual — <span id="aoi-shift-title">—</span></h3>
      <div id="aoi-wrap-rt">
        <table id="aoi-table-rt">
          <thead>
            <tr><th>Linea</th><th>Modelo</th><th>Lado</th><th>Cantidad</th></tr>
          </thead>
          <tbody id="aoi-rt-body"><tr><td colspan="4" id="aoi-empty">Cargando…</td></tr></tbody>
        </table>
      </div>
      <div id="aoi-rt-total">—</div>
    </div>
  </div>

  <div id="aoi-toolbar-day">
    <input type="date" id="aoi-date">
    <button id="aoi-btn-query">Consultar dia</button>
    <span>Tabla 2: Por dia</span>
  </div>

  <div id="aoi-card-day">
    <h3>Dia — <span id="aoi-day-title">—</span></h3>
    <div id="aoi-wrap-day">
      <table id="aoi-table-day">
        <thead>
          <tr><th>Fecha</th><th>Linea</th><th>Turno</th><th>Modelo</th><th>Lado</th><th>Cantidad</th></tr>
        </thead>
        <tbody id="aoi-day-body"><tr><td colspan="6" id="aoi-empty">Selecciona una fecha</td></tr></tbody>
      </table>
    </div>
    <div id="aoi-day-total">—</div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/historial-aoi-module.js', v='20260527a') }}"></script>
