<!-- Historial de Operadores por Maquina - fragmento AJAX (solo lectura).
     WF_001: cargado desde LISTA_DE_CONTROL_DE_RESULTADOS / Historial de maquinas calidad.
     WF_002: container historial-operadores-maquina-unique-container.
     WF_003: consumido por app/api/control_resultados/historial_operadores_maquina.py.
     WF_004: CSS persistente en MainTemplate.html y JS idempotente.
     Estilo: tarjetas tema ILSAN, mismo lenguaje visual que Historial ICT (ict.css). -->
<section id="hopm-module" class="hopm-page">

  <!-- Tarjeta de filtros -->
  <div class="hopm-card">
    <div class="hopm-card-header">
      <svg class="hopm-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"></path>
      </svg>
      <h3>Filtros de Búsqueda</h3>
    </div>
    <form id="hopm-filters" class="hopm-filters">
      <div class="hopm-filter-group hopm-filter-group--search">
        <label for="hopm-search">
          <svg class="hopm-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
          </svg>
          Buscar
        </label>
        <input id="hopm-search" type="search" autocomplete="off" placeholder="Estación, línea o usuario...">
      </div>

      <div class="hopm-filter-group">
        <label for="hopm-type-filter">
          <svg class="hopm-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path>
          </svg>
          Tipo
        </label>
        <select id="hopm-type-filter">
          <option value="">Todos</option>
          <option value="ICT">ICT</option>
          <option value="FCT">FCT</option>
          <option value="Packing">Packing</option>
        </select>
      </div>

      <div class="hopm-filter-group">
        <label for="hopm-status-filter">
          <svg class="hopm-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          Estado
        </label>
        <select id="hopm-status-filter">
          <option value="">Todos</option>
          <option value="Open">En curso</option>
          <option value="Closed">Cerradas</option>
        </select>
      </div>

      <div class="hopm-filter-group">
        <label for="hopm-date-from">
          <svg class="hopm-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          Desde
        </label>
        <input id="hopm-date-from" type="date" value="{{ hoy }}">
      </div>

      <div class="hopm-filter-group">
        <label for="hopm-date-to">
          <svg class="hopm-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          Hasta
        </label>
        <input id="hopm-date-to" type="date" value="{{ hoy }}">
      </div>

      <button class="hopm-btn-primary" type="submit">
        <svg class="hopm-btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
        Consultar
      </button>
      <button id="hopm-clear" class="hopm-btn-ghost" type="button">Limpiar</button>
    </form>
  </div>

  <!-- Tarjeta de resultados -->
  <div class="hopm-card">
    <div class="hopm-card-header">
      <svg class="hopm-card-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
      <h3>Historial de Operadores por Máquina</h3>
      <span class="hopm-record-count"><strong id="hopm-total">0</strong> sesiones</span>
      <span class="hopm-record-count hopm-record-count--ok"><strong id="hopm-open">0</strong> en curso</span>
      <span class="hopm-record-count"><strong id="hopm-closed">0</strong> cerradas</span>
      <button id="hopm-export" class="hopm-btn-export" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 10v6m0 0l-3-3m3 3l3-3M3 17v3a2 2 0 002 2h14a2 2 0 002-2v-3"></path>
        </svg>
        Exportar Excel
      </button>
      <button id="hopm-refresh" class="hopm-btn-header" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
        </svg>
        Actualizar
      </button>
    </div>
    <div class="hopm-table-wrap">
      <div id="hopm-loading" class="hopm-table-loading" hidden>
        <div class="hopm-spinner"></div>
        <span>Cargando historial...</span>
      </div>
      <table id="hopm-table" class="hopm-table" aria-label="Historial de operadores por maquina">
        <thead>
          <tr>
            <th>Línea</th>
            <th>Estación</th>
            <th>Nombre</th>
            <th>Tipo</th>
            <th>Usuario</th>
            <th>Fecha</th>
            <th>Entrada</th>
            <th>Salida</th>
            <th>Duración</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody id="hopm-tbody">
          <tr>
            <td colspan="10" class="hopm-empty">Sin datos cargados</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</section>

<script src="{{ url_for('static', filename='js/historial_operadores_maquina.js', v='20260610b') }}"></script>
