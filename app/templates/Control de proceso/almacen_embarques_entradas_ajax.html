<div
    id="almacen-embarques-entries-module"
    class="almacen-embarques-history-module"
    data-module-type="entries"
>
    <div class="ae-filters-card">
        <div class="ae-card-header">
            <h3>Filtros de búsqueda</h3>
        </div>
        <div class="ae-filters">
            <div class="ae-filter-group ae-filter-group--wide">
                <label for="almacen-embarques-entries-search">Buscar</label>
                <input
                    type="text"
                    id="almacen-embarques-entries-search"
                    placeholder="No. parte, folio, modelo, cliente o usuario"
                >
            </div>
            <div class="ae-filter-group">
                <label for="almacen-embarques-entries-date-from">Fecha desde</label>
                <input type="date" id="almacen-embarques-entries-date-from">
            </div>
            <div class="ae-filter-group">
                <label for="almacen-embarques-entries-date-to">Fecha hasta</label>
                <input type="date" id="almacen-embarques-entries-date-to">
            </div>
            <button id="almacen-embarques-entries-search-btn" class="ae-btn-primary">
                Consultar
            </button>
            <button id="almacen-embarques-entries-clear-btn" class="ae-btn-secondary">
                Limpiar filtros
            </button>
            <button id="almacen-embarques-entries-export-btn" class="ae-btn-export">
                Exportar Excel
            </button>
        </div>
    </div>

    <div class="ae-results-card">
        <div class="ae-card-header">
            <h3>Historial de entradas</h3>
            <span id="almacen-embarques-entries-count" class="ae-record-count">
                0 registros
            </span>
            <span id="almacen-embarques-entries-status" class="ae-status-text"></span>
        </div>
        <div class="ae-table-shell">
            <div class="ae-table-head">
                <table class="ae-history-table ae-history-table--head">
                    <colgroup>
                        <col style="width: 8%;">
                        <col style="width: 7%;">
                        <col style="width: 17%;">
                        <col style="width: 10%;">
                        <col style="width: 7%;">
                        <col style="width: 17%;">
                        <col style="width: 6%;">
                        <col style="width: 6%;">
                        <col style="width: 11%;">
                        <col style="width: 11%;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Folio</th>
                            <th>No. parte</th>
                            <th>Cantidad</th>
                            <th>Modelo</th>
                            <th>Cliente</th>
                            <th>Zona</th>
                            <th>Ubicación</th>
                            <th>Usuario</th>
                        </tr>
                    </thead>
                </table>
            </div>
            <div class="ae-table-body-wrap">
                <table class="ae-history-table ae-history-table--body">
                    <colgroup>
                        <col style="width: 8%;">
                        <col style="width: 7%;">
                        <col style="width: 17%;">
                        <col style="width: 10%;">
                        <col style="width: 7%;">
                        <col style="width: 17%;">
                        <col style="width: 6%;">
                        <col style="width: 6%;">
                        <col style="width: 11%;">
                        <col style="width: 11%;">
                    </colgroup>
                    <tbody id="almacen-embarques-entries-tbody">
                        <tr>
                            <td colspan="10" class="ae-empty-cell">Cargando historial...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/almacen_embarques_history.js', v='20260416g') }}"></script>
