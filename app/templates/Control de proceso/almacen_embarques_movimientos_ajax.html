<div
    id="almacen-embarques-movements-module"
    class="almacen-embarques-history-module"
    data-module-type="movements"
>
    <div class="ae-filters-card">
        <div class="ae-card-header">
            <h3>Filtros de búsqueda</h3>
        </div>
        <div class="ae-filters">
            <div class="ae-filter-group ae-filter-group--wide">
                <label for="almacen-embarques-movements-search">Buscar</label>
                <input
                    type="text"
                    id="almacen-embarques-movements-search"
                    placeholder="No. parte, folio, departure, zona, ubicación, cliente o usuario"
                >
            </div>
            <div class="ae-filter-group">
                <label for="almacen-embarques-movements-type">Tipo</label>
                <select id="almacen-embarques-movements-type">
                    <option value="">Todos</option>
                    <option value="entry">Entradas</option>
                    <option value="exit">Salidas</option>
                    <option value="return">Retornos</option>
                </select>
            </div>
            <div class="ae-filter-group">
                <label for="almacen-embarques-movements-date-from">Fecha desde</label>
                <input type="date" id="almacen-embarques-movements-date-from">
            </div>
            <div class="ae-filter-group">
                <label for="almacen-embarques-movements-date-to">Fecha hasta</label>
                <input type="date" id="almacen-embarques-movements-date-to">
            </div>
            <button id="almacen-embarques-movements-search-btn" class="ae-btn-primary">
                Consultar
            </button>
            <button id="almacen-embarques-movements-clear-btn" class="ae-btn-secondary">
                Limpiar filtros
            </button>
            <button id="almacen-embarques-movements-export-btn" class="ae-btn-export">
                Exportar Excel
            </button>
        </div>
    </div>

    <div class="ae-results-card">
        <div class="ae-card-header">
            <h3>Modificar movimientos</h3>
            <span id="almacen-embarques-movements-count" class="ae-record-count">
                0 registros
            </span>
            <span id="almacen-embarques-movements-status" class="ae-status-text"></span>
        </div>
        <div class="ae-table-shell">
            <div class="ae-table-head">
                <table class="ae-history-table ae-history-table--head">
                    <colgroup>
                        <col style="width: 7%;">
                        <col style="width: 6%;">
                        <col style="width: 8%;">
                        <col style="width: 15%;">
                        <col style="width: 11%;">
                        <col style="width: 7%;">
                        <col style="width: 10%;">
                        <col style="width: 8%;">
                        <col style="width: 7%;">
                        <col style="width: 10%;">
                        <col style="width: 5%;">
                        <col style="width: 7%;">
                    </colgroup>
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Tipo</th>
                            <th>Folio</th>
                            <th>No. parte</th>
                            <th>Cantidad</th>
                            <th>Modelo</th>
                            <th>Cliente</th>
                            <th>Zona</th>
                            <th>Ubicación / Destino</th>
                            <th>Departure</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                </table>
            </div>
            <div class="ae-table-body-wrap">
                <table class="ae-history-table ae-history-table--body">
                    <colgroup>
                        <col style="width: 7%;">
                        <col style="width: 6%;">
                        <col style="width: 8%;">
                        <col style="width: 15%;">
                        <col style="width: 11%;">
                        <col style="width: 7%;">
                        <col style="width: 10%;">
                        <col style="width: 8%;">
                        <col style="width: 7%;">
                        <col style="width: 10%;">
                        <col style="width: 5%;">
                        <col style="width: 7%;">
                    </colgroup>
                    <tbody id="almacen-embarques-movements-tbody">
                        <tr>
                            <td colspan="12" class="ae-empty-cell">Cargando movimientos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
