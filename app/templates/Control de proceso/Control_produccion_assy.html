<!-- Fragment AJAX. CSS persistente en MainTemplate.html (WF_004).
     Migracion 2026-05-26: prefijo asasy- en lugar de plan-* para evitar colisiones con IMT/SMT. -->
<div id="assy-container">

  <!-- Toolbar -->
  <div id="assy-toolbar">
    <button id="assy-openModalBtn" class="assy-btn assy-btn-add">+ Nuevo Plan</button>
    <button id="assy-wo-openModalBtn" class="assy-btn">Importar WOs</button>
    <button id="assy-export-excel-btn" class="assy-btn">Exportar Excel</button>
    <button id="assy-reschedule-openModalBtn" class="assy-btn">Reprogramar</button>
    <button id="assy-scan-lots-openModalBtn" class="assy-btn" style="background-color:#d35400;">Lotes SCAN sin asignar</button>

    <div class="assy-planning-controls">
      <label>Grupos:</label>
      <select id="assy-groups-count" class="assy-input">
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6" selected>6</option>
        <option value="7">7</option>
        <option value="8">8</option>
      </select>
      <button id="assy-auto-arrange-btn" class="assy-btn">Auto Acomodo</button>
      <button id="assy-save-sequences-btn" class="assy-btn">Guardar Orden</button>

      <div style="border-left: 1px solid #20688C; padding-left: 10px; margin-left: 6px; display: flex; gap: 6px; align-items: center;">
        <button id="assy-toggle-view-btn" class="assy-btn" style="background-color: #16a085;">Vista por Lineas</button>
        <select id="assy-line-filter" class="assy-input" style="width: 80px; display: none;">
          <option value="">Todas</option>
        </select>
      </div>
    </div>

    <input type="date" id="assy-filter-start" class="assy-input">
    <button onclick="window.assyLoadPlans && window.assyLoadPlans()" class="assy-btn assy-btn-refresh">Filtrar</button>
  </div>

  <!-- Tabla -->
  <div id="assy-table-container">
    <table id="assy-table">
      <thead>
        <tr>
          <th>Sec</th>
          <th>Lot No</th>
          <th>WO</th>
          <th>PO</th>
          <th>Fecha</th>
          <th>Line</th>
          <th>Turno</th>
          <th>Model Code</th>
          <th>Part No</th>
          <th>Project</th>
          <th>Process</th>
          <th>CT</th>
          <th>UPH</th>
          <th>Plan</th>
          <th>Input</th>
          <th>Output</th>
          <th>Entregadas M</th>
          <th>Status</th>
          <th>Tiempo</th>
          <th>Inicio</th>
          <th>Fin</th>
          <th>Turno</th>
        </tr>
      </thead>
      <tbody id="assy-tableBody"></tbody>
    </table>
  </div>

  <!-- Los modales se crean dinamicamente en JavaScript (ver plan-assy-core.js - createModalsInBody()) -->
</div>
