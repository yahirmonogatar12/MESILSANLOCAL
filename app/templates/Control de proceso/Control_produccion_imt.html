<!-- Fragment AJAX. CSS persistente en MainTemplate.html (WF_004). -->
<div id="imd-plan-container">

  <!-- Toolbar Simple -->
  <div id="imd-plan-toolbar">
    <button id="imd-openModalBtn" class="plan-btn plan-btn-add">+ Nuevo Plan</button>
    <button id="imd-export-excel-btn" class="plan-btn">Exportar Excel</button>
    <button id="imd-import-excel-btn" class="plan-btn" style="background: #8e44ad;">Importar Excel</button>
    <button id="imd-save-sequences-btn" class="plan-btn" style="background: #16a085;">Guardar Orden</button>
    <button id="imd-reschedule-btn" class="plan-btn" style="background: #e67e22;">Reprogramar</button>
    <button id="imd-reschedule-cancel-btn" class="plan-btn" style="background: #c0392b; display:none;">Cancelar Seleccion</button>

    <div style="display: flex; gap: 8px; align-items: center; margin-left: auto;">
      <label style="color: #888;">Fecha:</label>
      <input type="date" id="imd-filter-start" class="plan-input">
      <button onclick="loadPlansIMD()" class="plan-btn plan-btn-refresh">Filtrar</button>
    </div>
  </div>

  <!-- Tabla -->
  <div id="imd-plan-table-container">
    <table id="imd-plan-table">
      <thead>
        <tr>
          <th style="width:30px; display:none;" class="reschedule-col"><input type="checkbox" id="select-all-imd" title="Seleccionar todos"></th>
          <th>Sec</th>
          <th>Lot No</th>
          <th>WO</th>
          <th>PO</th>
          <th>Fecha</th>
          <th>Line</th>
          <th>Shift</th>
          <th>Model Code</th>
          <th>Part No</th>
          <th>Process</th>
          <th>CT</th>
          <th>UPH</th>
          <th>Plan</th>
          <th>Output</th>
          <th>Status</th>
          <th>Turno</th>
        </tr>
      </thead>
      <tbody id="imd-plan-tableBody"></tbody>
    </table>
  </div>

  <!-- Los modales se crean dinamicamente en JavaScript (ver plan_imd.js - createModalsInBodyIMD()) -->
</div>

<!-- WF_004: axios se carga persistente desde MainTemplate.html. -->
<script src="{{ url_for('static', filename='js/plan_imd.js', v='20260526a') }}"></script>
