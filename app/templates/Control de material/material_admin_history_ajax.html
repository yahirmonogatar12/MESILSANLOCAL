<div id="mat-admin-history-unique-container" class="mat-admin-page" data-history-type="{{ tipo }}">
    <div class="mat-admin-toolbar">
        <label>
            Desde
            <input id="mat-admin-history-start" type="date">
        </label>
        <label>
            Hasta
            <input id="mat-admin-history-end" type="date">
        </label>
        <label>
            Buscar
            <input id="mat-admin-history-text" type="text" autocomplete="off" placeholder="Codigo, parte, lote, usuario">
        </label>
        <div class="mat-admin-actions">
            <button id="mat-admin-history-btn-search" class="mat-admin-btn primary" type="button">Consultar</button>
            <button id="mat-admin-history-btn-clear" class="mat-admin-btn" type="button">Limpiar</button>
            <button id="mat-admin-history-btn-export" class="mat-admin-btn success" type="button">Exportar Excel</button>
        </div>
    </div>

    <div id="mat-admin-history-loading" class="mat-admin-loading">Cargando...</div>
    <div id="mat-admin-history-message" class="mat-admin-message" hidden></div>

    <div class="mat-admin-grid-wrap">
        <table class="mat-admin-table">
            <thead id="mat-admin-history-head"></thead>
            <tbody id="mat-admin-history-body"></tbody>
        </table>
    </div>

    <div class="mat-admin-footer">
        <span id="mat-admin-history-count">Total Rows: 0</span>
        <div id="mat-admin-history-pagination" class="mat-admin-pagination">
            <button id="mat-admin-history-prev" class="mat-admin-btn small" type="button">Anterior</button>
            <span id="mat-admin-history-page">Pagina 1</span>
            <button id="mat-admin-history-next" class="mat-admin-btn small" type="button">Siguiente</button>
            <select id="mat-admin-history-page-size">
                <option value="100">100</option>
                <option value="500" selected>500</option>
                <option value="1000">1000</option>
            </select>
        </div>
    </div>
</div>

<link rel="stylesheet" href="{{ url_for('static', filename='css/material_admin_inventory.css', v='20260520j') }}">
<script src="{{ url_for('static', filename='js/material_admin_inventory.js', v='20260520j') }}"></script>
