<div id="mat-admin-history-{{ tipo }}-root" class="mat-admin-page" data-history-type="{{ tipo }}">
    <div class="mat-admin-toolbar">
        <label>
            Desde
            <input id="mat-admin-history-start-{{ tipo }}" type="date">
        </label>
        <label>
            Hasta
            <input id="mat-admin-history-end-{{ tipo }}" type="date">
        </label>
        <label>
            Buscar
            <input id="mat-admin-history-text-{{ tipo }}" type="text" autocomplete="off" placeholder="Codigo, parte, lote, usuario">
        </label>
        <div class="mat-admin-actions">
            <button id="mat-admin-history-btn-search-{{ tipo }}" class="mat-admin-btn primary" type="button">Consultar</button>
            <button id="mat-admin-history-btn-clear-{{ tipo }}" class="mat-admin-btn" type="button">Limpiar</button>
            <button id="mat-admin-history-btn-export-{{ tipo }}" class="mat-admin-btn success" type="button">Exportar Excel</button>
        </div>
    </div>

    <div id="mat-admin-history-loading-{{ tipo }}" class="mat-admin-loading">Cargando...</div>
    <div id="mat-admin-history-message-{{ tipo }}" class="mat-admin-message" hidden></div>

    <div class="mat-admin-grid-wrap">
        <table class="mat-admin-table">
            <thead id="mat-admin-history-head-{{ tipo }}"></thead>
            <tbody id="mat-admin-history-body-{{ tipo }}"></tbody>
        </table>
    </div>

    <div class="mat-admin-footer">
        <span id="mat-admin-history-count-{{ tipo }}">Total Rows: 0</span>
        <div id="mat-admin-history-pagination-{{ tipo }}" class="mat-admin-pagination">
            <button id="mat-admin-history-prev-{{ tipo }}" class="mat-admin-btn small" type="button">Anterior</button>
            <span id="mat-admin-history-page-{{ tipo }}">Pagina 1</span>
            <button id="mat-admin-history-next-{{ tipo }}" class="mat-admin-btn small" type="button">Siguiente</button>
            <select id="mat-admin-history-page-size-{{ tipo }}">
                <option value="100">100</option>
                <option value="500" selected>500</option>
                <option value="1000">1000</option>
            </select>
        </div>
    </div>
</div>
