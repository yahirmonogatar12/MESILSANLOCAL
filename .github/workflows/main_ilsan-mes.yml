# CI del MES ILSAN.
#
# Antes este workflow construia y DESPLEGABA a Azure App Service. El
# despliegue se elimino el 2026-05-29: la app corre en un server local,
# no en Azure/Vercel/Docker. Ahora el workflow solo VALIDA el codigo
# (sintaxis + smoke test + pytest) en cada push/PR a main.

name: CI - ILSAN MES

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies (mysqlclient)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config default-libmysqlclient-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Compile all (chequeo de sintaxis)
        run: python -m compileall -q app app_factory.py run.py

      - name: Pytest
        env:
          MES_SKIP_STARTUP_INIT: "1"
          PYTHONIOENCODING: "utf-8"
          # SECRET_KEY de prueba para que la app arranque en CI.
          SECRET_KEY: "ci-test-secret-key"
        run: pytest -q
